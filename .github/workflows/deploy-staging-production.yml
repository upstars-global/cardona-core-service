name: Deploy staging and production
on:
  push:
    branches:
      - master
jobs:
  build-core-service-staging:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [ 23 ]

    permissions:
      # Required to checkout the code
      contents: read
      # Required to put a comment into the pull-request
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'yarn'

      - name: Install yarn & install dependencies
        uses: borales/actions-yarn@v4
        with:
          cmd: install

      - name: Test
        uses: borales/actions-yarn@v4
        with:
          cmd: test:coverage

      - name: Report Coverage
        if: always() # Also generate the report if tests are failing
        uses:  davelosert/vitest-coverage-report-action@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          json-summary-path: coverage/coverage-summary.json
          json-final-path: coverage/coverage-final.json
          file-coverage-mode: all # Показывать всегда
          working-directory: ./
          comment-on: commit

      - name: Build
        run: npm run build-cf

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-dist
          path: ./server/dist

  deploy-core-service-staging:
    runs-on: ubuntu-latest
    environment: staging
    needs: build-core-service-staging
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Download Build Artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-dist
          path: ./server/build-dist

      - name: Deploy app staging
        id: deploy-staging
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.BO_CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.BO_CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy ./server/build-dist --project-name=cardona-core-service --branch=staging

      - name: Cleanup old staging branch deployments
        env:
          CF_API_TOKEN: ${{ secrets.BO_CLOUDFLARE_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.BO_CLOUDFLARE_ACCOUNT_ID }}
          CF_PROJECT_NAME: cardona-core-service
        run: |
          echo "Удаляем старые деплои CF Pages для ветки: staging"

          PAGE=1
          ALL_DEPLOYMENTS='[]'

          while true; do
            RESPONSE=$(curl -s -X GET \
              "https://api.cloudflare.com/client/v4/accounts/$CF_ACCOUNT_ID/pages/projects/$CF_PROJECT_NAME/deployments?page=$PAGE&per_page=25" \
              -H "Authorization: Bearer $CF_API_TOKEN" \
              -H "Content-Type: application/json")

            SUCCESS=$(echo "$RESPONSE" | jq -r '.success')
            if [ "$SUCCESS" != "true" ]; then
              echo "Ошибка при получении списка деплоев (страница $PAGE):"
              echo "$RESPONSE" | jq '.errors'
              exit 1
            fi

            PAGE_DEPS=$(echo "$RESPONSE" | jq '[.result[] | select(.deployment_trigger.metadata.branch == "staging") | {id, created_on}]')
            ALL_DEPLOYMENTS=$(echo "$ALL_DEPLOYMENTS" | jq --argjson page "$PAGE_DEPS" '. + $page')

            COUNT=$(echo "$RESPONSE" | jq '.result | length')
            if [ "$COUNT" -lt 25 ]; then
              break
            fi
            PAGE=$((PAGE + 1))
          done

          OLD_DEPLOYMENT_IDS=$(echo "$ALL_DEPLOYMENTS" | jq -r 'sort_by(.created_on) | reverse | .[1:] | .[].id')

          if [ -z "$OLD_DEPLOYMENT_IDS" ]; then
            echo "Старых деплоев для ветки 'staging' не найдено"
          else
            for DEPLOYMENT_ID in $OLD_DEPLOYMENT_IDS; do
              echo "Удаляем старый деплой: $DEPLOYMENT_ID"
              curl -s -X DELETE \
                "https://api.cloudflare.com/client/v4/accounts/$CF_ACCOUNT_ID/pages/projects/$CF_PROJECT_NAME/deployments/$DEPLOYMENT_ID?force=true" \
                -H "Authorization: Bearer $CF_API_TOKEN" \
                -H "Content-Type: application/json" > /dev/null
              echo "Деплой $DEPLOYMENT_ID удалён"
            done
          fi

      - name: Print deployment-url
        env:
          DEPLOYMENT_URL: ${{ steps.deploy.outputs.deployment-url }}
        run: echo $DEPLOYMENT_URL

      - name: Get Deployment URL and Deployment Timestamp
        id: get-deploy-url
        run: |
          echo "DEPLOYMENT_STAGING_URL=${{ steps.deploy-staging.outputs.deployment-url }}" >> $GITHUB_ENV
          echo "DEPLOYMENT_STAGING_ALIAS_URL=${{ steps.deploy-staging.outputs.pages-deployment-alias-url }}" >> $GITHUB_ENV
          echo "date=$(date -u)" >> $GITHUB_ENV

      - name: Comment PR with Deployment Table
        if: github.event_name == 'pull_request'
        uses: thollander/actions-comment-pull-request@v2
        with:
          message: |
            ## 🚀 Deploying STAGING **cardona-core-service** with ☁️ Cloudflare Pages
            
            | **Latest commit:** | `${{ github.sha }}` |
            |---------------|------------------|
            | **Status:** | ✅ Deploy successful! |
            | **Branch STAGING URL:** | [🔗 ${{ steps.deploy-staging.outputs.pages-deployment-alias-url }}](${{ steps.deploy-staging.outputs.pages-deployment-alias-url }}) |
            |---------------|------------------|
            | **Deployment Time:** | 🕒 `${{ env.date }}` |
          comment_tag: cloudflare-deploy-staging-comment
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  deploy-core-service-production:
    runs-on: ubuntu-latest
    environment: production
    needs: build-core-service-staging
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download Build Artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-dist
          path: ./server/build-dist

      - name: Deploy app production
        id: deploy-production
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.BO_CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.BO_CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy ./server/build-dist --project-name=cardona-core-service

      - name: Get Deployment URL and Deployment Timestamp
        id: get-deploy-url
        run: |
          echo "DEPLOYMENT_PRODUCTION_URL=${{ steps.deploy-production.outputs.deployment-url }}" >> $GITHUB_ENV
          echo "DEPLOYMENT_PRODUCTION_ALIAS_URL=${{ steps.deploy-production.outputs.pages-deployment-alias-url }}" >> $GITHUB_ENV
          echo "date=$(date -u)" >> $GITHUB_ENV

      - name: Comment PR with Deployment Table
        if: github.event_name == 'pull_request'
        uses: thollander/actions-comment-pull-request@v2
        with:
          message: |
            ## 🚀 Deploying PRODUCTION **cardona-core-service** with ☁️ Cloudflare Pages
            
            | **Latest commit:** | `${{ github.sha }}` |
            |---------------|------------------|
            | **Status:** | ✅ Deploy successful! |
            | **Branch PRODUCTION URL:** | [🔗 ${{ steps.deploy-production.outputs.pages-deployment-alias-url }}](${{ steps.deploy-production.outputs.pages-deployment-alias-url }}) |
            | **Deployment Time:** | 🕒 `${{ env.date }}` |
          comment_tag: cloudflare-deploy-production-comment
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
